<script>
  const ANSWER = 'FROGS';
  const MAX_GUESSES = 6;
  const WORD_LENGTH = 5;

  const BOT_URL = 'https://frogdle-bot-production.up.railway.app';

  let VALID_WORDS = new Set();
  let wordsLoaded = false;

  // ---------------- WORD LOADING (SAFE) ----------------
  async function loadWords() {
    try {
      const res = await fetch(
        "https://gist.githubusercontent.com/dracos/dd0668f281e685bad51479e5acaadb93/raw/6bfa15d263d6d5b63840a8e5b64e04b382fdb079/valid-wordle-words.txt"
      );

      const text = await res.text();

      VALID_WORDS = new Set(
        text
          .split("\n")
          .map(w => w.trim().toUpperCase())
          .filter(w => w.length === WORD_LENGTH)
      );

      wordsLoaded = true;
      console.log("Loaded words:", VALID_WORDS.size);

    } catch (err) {
      console.warn("Word list failed to load, using fallback", err);

      // fallback so game NEVER breaks
      VALID_WORDS = new Set(["FROGS", "ABOUT", "OTHER", "WORDS"]);
      wordsLoaded = true;
    }
  }

  // ---------------- GAME STATE ----------------
  const urlParams = new URLSearchParams(window.location.search);
  const guildId = urlParams.get('guild');
  const userId = urlParams.get('user');
  const username = urlParams.get('username') || 'Someone';

  let guesses = [];
  let currentGuess = '';
  let gameOver = false;
  let tileStates = [];

  const todayKey = () => {
    const d = new Date();
    return `frogdle_${d.getFullYear()}_${d.getMonth()}_${d.getDate()}`;
  };

  function loadState() {
    try { return JSON.parse(localStorage.getItem(todayKey()) || 'null'); }
    catch { return null; }
  }

  function saveState(won) {
    localStorage.setItem(todayKey(), JSON.stringify({
      guesses,
      tileStates,
      gameOver,
      won
    }));
  }

  // ---------------- UI BUILD ----------------
  function buildGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    for (let r = 0; r < MAX_GUESSES; r++) {
      const row = document.createElement('div');
      row.className = 'row';
      row.id = `row-${r}`;

      for (let c = 0; c < WORD_LENGTH; c++) {
        const tile = document.createElement('div');
        tile.className = 'tile';
        tile.id = `tile-${r}-${c}`;
        row.appendChild(tile);
      }

      grid.appendChild(row);
    }
  }

  function buildKeyboard() {
    const rows = [
      ['Q','W','E','R','T','Y','U','I','O','P'],
      ['A','S','D','F','G','H','J','K','L'],
      ['Enter','Z','X','C','V','B','N','M','⌫']
    ];

    const kb = document.getElementById('keyboard');
    kb.innerHTML = '';

    rows.forEach(r => {
      const row = document.createElement('div');
      row.className = 'kb-row';

      r.forEach(k => {
        const btn = document.createElement('button');
        btn.className = 'key' + (k === 'Enter' || k === '⌫' ? ' wide' : '');
        btn.textContent = k;
        btn.dataset.key = k;
        btn.addEventListener('click', () => handleKey(k));
        row.appendChild(btn);
      });

      kb.appendChild(row);
    });
  }

  // ---------------- INPUT ----------------
  function handleKey(key) {
    if (gameOver) return;

    if (key === '⌫' || key === 'Backspace') {
      currentGuess = currentGuess.slice(0, -1);
      updateCurrentRow();

    } else if (key === 'Enter') {
      submitGuess();

    } else if (/^[A-Za-z]$/.test(key)) {
      if (currentGuess.length < WORD_LENGTH) {
        currentGuess += key.toUpperCase();
        updateCurrentRow();
      }
    }
  }

  function updateCurrentRow() {
    const row = guesses.length;

    for (let c = 0; c < WORD_LENGTH; c++) {
      const tile = document.getElementById(`tile-${row}-${c}`);
      if (!tile) continue;

      const letter = currentGuess[c] || '';
      tile.textContent = letter;
      tile.className = 'tile' + (letter ? ' filled' : '');
    }
  }

  // ---------------- WORD CHECK ----------------
  function submitGuess() {
    if (!wordsLoaded) {
      showToast("Loading words...");
      return;
    }

    if (currentGuess.length < WORD_LENGTH) {
      shakeRow(guesses.length);
      showToast('Not enough letters');
      return;
    }

    if (!VALID_WORDS.has(currentGuess)) {
      shakeRow(guesses.length);
      showToast('Not in word list');
      return;
    }

    const row = guesses.length;
    const states = evaluateGuess(currentGuess);

    tileStates.push(currentGuess.split('').map((l, i) => ({
      letter: l,
      state: states[i]
    })));

    animateRow(row, states, () => {
      updateKeyboard(currentGuess, states);
      guesses.push(currentGuess);

      const won = currentGuess === ANSWER;

      if (won) {
        gameOver = true;
        saveState(true);
        showEndCard(true);

      } else if (guesses.length === MAX_GUESSES) {
        gameOver = true;
        saveState(false);
        showEndCard(false);

      } else {
        currentGuess = '';
        saveState(false);
      }
    });
  }

  // ---------------- LOGIC ----------------
  function evaluateGuess(guess) {
    const result = Array(WORD_LENGTH).fill('absent');
    const answerArr = ANSWER.split('');
    const guessArr = guess.split('');
    const used = Array(WORD_LENGTH).fill(false);

    for (let i = 0; i < WORD_LENGTH; i++) {
      if (guessArr[i] === answerArr[i]) {
        result[i] = 'correct';
        used[i] = true;
      }
    }

    for (let i = 0; i < WORD_LENGTH; i++) {
      if (result[i] === 'correct') continue;

      for (let j = 0; j < WORD_LENGTH; j++) {
        if (!used[j] && guessArr[i] === answerArr[j]) {
          result[i] = 'present';
          used[j] = true;
          break;
        }
      }
    }

    return result;
  }

  // ---------------- ANIMATION ----------------
  function animateRow(row, states, callback) {
    const tiles = document.querySelectorAll(`#row-${row} .tile`);

    tiles.forEach((tile, i) => {
      setTimeout(() => {
        tile.classList.add('flip');

        setTimeout(() => {
          tile.classList.remove('flip');
          tile.classList.add(states[i]);
        }, 250);

      }, i * 120);
    });

    setTimeout(callback, WORD_LENGTH * 120 + 300);
  }

  function shakeRow(row) {
    const tiles = document.querySelectorAll(`#row-${row} .tile`);
    tiles.forEach(t => {
      t.classList.add('shake');
      setTimeout(() => t.classList.remove('shake'), 400);
    });
  }

  function updateKeyboard(guess, states) {
    const priority = { correct: 3, present: 2, absent: 1 };
    const keyMap = {};

    for (let i = 0; i < WORD_LENGTH; i++) {
      const k = guess[i];
      const s = states[i];
      if (!keyMap[k] || priority[s] > priority[keyMap[k]]) {
        keyMap[k] = s;
      }
    }

    for (const [k, s] of Object.entries(keyMap)) {
      const btn = document.querySelector(`.key[data-key="${k}"]`);
      if (btn && !btn.classList.contains('correct')) {
        btn.classList.remove('correct', 'present', 'absent');
        btn.classList.add(s);
      }
    }
  }

  // ---------------- UI HELPERS ----------------
  function showToast(msg, duration = 1400) {
    const t = document.getElementById('toast');
    if (!t) return;

    t.textContent = msg;
    t.classList.add('show');

    setTimeout(() => t.classList.remove('show'), duration);
  }

  function showEndCard(won) {
    const card = document.getElementById('end-card');
    if (!card) return;

    card.classList.add('visible');
  }

  function restoreCompletedGame(saved) {
    if (!saved.tileStates) return;

    saved.tileStates.forEach((gRow, row) => {
      gRow.forEach(({ letter, state }, col) => {
        const tile = document.getElementById(`tile-${row}-${col}`);
        if (!tile) return;

        tile.textContent = letter;
        tile.className = `tile ${state}`;
      });
    });
  }

  // ---------------- INIT (SAFE) ----------------
  async function init() {
    buildGrid();
    buildKeyboard();

    showToast("Loading word list...");

    await loadWords();

    showToast("Ready!");

    const saved = loadState();

    if (saved && saved.gameOver) {
      guesses = saved.guesses || [];
      tileStates = saved.tileStates || [];
      gameOver = true;

      restoreCompletedGame(saved);
      showEndCard(saved.won);
    }

    document.addEventListener('keydown', e => {
      if (e.ctrlKey || e.metaKey || e.altKey) return;

      if (e.key === 'Backspace') handleKey('Backspace');
      else if (e.key === 'Enter') handleKey('Enter');
      else if (/^[a-zA-Z]$/.test(e.key)) handleKey(e.key);
    });
  }

  init();
</script>
