<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FROGDLE 🐸</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d1f0f;
      --surface: #152417;
      --border: #2a4a2e;
      --green: #4caf50;
      --green-bright: #6fcf72;
      --yellow: #d4a017;
      --yellow-bright: #f0c040;
      --grey: #3a4a3c;
      --grey-light: #6b7c6d;
      --text: #e8f5e9;
      --text-muted: #7a9b7d;
      --lily: #1b3a1e;
      --pond: #0a2e1a;
      --key-bg: #243d27;
      --key-text: #c8e6c9;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* Lily pad background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse 120px 80px at 10% 20%, rgba(30,80,30,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 90px 60px at 85% 75%, rgba(30,80,30,0.15) 0%, transparent 70%),
        radial-gradient(ellipse 70px 50px at 60% 10%, rgba(30,80,30,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 100px 70px at 30% 85%, rgba(30,80,30,0.14) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Subtle ripple lines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 48px,
        rgba(76,175,80,0.03) 48px,
        rgba(76,175,80,0.03) 50px
      );
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 500px;
      padding: 18px 16px 0;
      text-align: center;
      border-bottom: 1px solid var(--border);
      padding-bottom: 14px;
      margin-bottom: 16px;
    }

    .title {
      font-family: 'Fredoka One', cursive;
      font-size: 2.4rem;
      letter-spacing: 4px;
      color: var(--green-bright);
      text-shadow: 0 0 30px rgba(111,207,114,0.35), 0 2px 0 rgba(0,0,0,0.4);
    }

    .frog-emoji { display: inline-block; animation: bob 2s ease-in-out infinite; }
    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }

    .subtitle {
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 2px;
    }

    main {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 500px;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    /* Toast */
    #toast {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: var(--text);
      color: var(--bg);
      font-weight: 800;
      font-size: 0.9rem;
      letter-spacing: 1px;
      padding: 10px 22px;
      border-radius: 999px;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 100;
      pointer-events: none;
      text-transform: uppercase;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Grid */
    #grid {
      display: grid;
      grid-template-rows: repeat(6, 1fr);
      gap: 6px;
      width: 100%;
      max-width: 330px;
    }

    .row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
    }

    .tile {
      aspect-ratio: 1;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Fredoka One', cursive;
      font-size: 1.9rem;
      color: var(--text);
      text-transform: uppercase;
      transition: border-color 0.1s;
      position: relative;
      overflow: hidden;
    }

    .tile.filled {
      border-color: var(--grey-light);
      animation: pop 0.1s ease;
    }

    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    .tile.flip {
      animation: flip 0.5s ease forwards;
    }

    @keyframes flip {
      0%   { transform: rotateX(0); }
      50%  { transform: rotateX(-90deg); }
      100% { transform: rotateX(0); }
    }

    .tile.correct {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }

    .tile.present {
      background: var(--yellow);
      border-color: var(--yellow);
      color: #fff;
    }

    .tile.absent {
      background: var(--grey);
      border-color: var(--grey);
      color: var(--grey-light);
    }

    .tile.shake {
      animation: shake 0.4s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    .tile.bounce {
      animation: bounce 0.6s ease forwards;
    }

    @keyframes bounce {
      0%   { transform: translateY(0); }
      40%  { transform: translateY(-18px); }
      70%  { transform: translateY(-8px); }
      85%  { transform: translateY(-14px); }
      100% { transform: translateY(0); }
    }

    /* Keyboard */
    #keyboard {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .kb-row {
      display: flex;
      justify-content: center;
      gap: 5px;
    }

    .key {
      height: 56px;
      min-width: 36px;
      padding: 0 6px;
      background: var(--key-bg);
      border: 1.5px solid var(--border);
      border-radius: 6px;
      color: var(--key-text);
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 0.8rem;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, transform 0.08s;
      flex: 1;
      max-width: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      letter-spacing: 0.5px;
      user-select: none;
    }

    .key.wide { max-width: 64px; font-size: 0.72rem; }

    .key:active { transform: scale(0.92); }

    .key.correct { background: var(--green); border-color: var(--green); color: #fff; }
    .key.present { background: var(--yellow); border-color: var(--yellow); color: #fff; }
    .key.absent  { background: var(--grey);   border-color: var(--grey);   color: var(--grey-light); }

    /* End card */
    #end-card {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      background: var(--lily);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 20px 24px;
      width: 100%;
      text-align: center;
    }

    #end-card.visible { display: flex; }

    #end-card .result-emoji {
      font-size: 3rem;
      animation: bob 1.8s ease-in-out infinite;
    }

    #end-card .result-title {
      font-family: 'Fredoka One', cursive;
      font-size: 1.5rem;
      color: var(--green-bright);
      letter-spacing: 2px;
    }

    #end-card .result-subtitle {
      font-size: 0.8rem;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    #end-card .answer-reveal {
      font-family: 'Fredoka One', cursive;
      font-size: 1.2rem;
      letter-spacing: 4px;
      color: var(--green);
      margin-top: 4px;
    }

    #countdown {
      font-size: 0.78rem;
      color: var(--text-muted);
      letter-spacing: 1px;
    }

    #countdown span {
      font-weight: 800;
      color: var(--text);
    }

    .share-btn {
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 28px;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 0.9rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      margin-top: 4px;
    }
    .share-btn:hover { background: var(--green-bright); transform: scale(1.03); }

    /* Already played */
    #already-played {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      background: var(--lily);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 28px 24px;
      width: 100%;
      text-align: center;
    }

    #already-played.visible { display: flex; }

    #already-played .ap-frog { font-size: 4rem; animation: bob 2s ease-in-out infinite; }
    #already-played .ap-title {
      font-family: 'Fredoka One', cursive;
      font-size: 1.6rem;
      color: var(--green-bright);
      letter-spacing: 2px;
    }
    #already-played .ap-sub {
      font-size: 0.78rem;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    footer {
      position: relative;
      z-index: 10;
      margin-top: auto;
      padding: 16px;
      font-size: 0.7rem;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-align: center;
    }
  </style>
</head>
<body>

<footer>🐸 frogdle — the answer is always frogs</footer>

  let currentGuess = '';
  let gameOver = false;
  let tileStates = []; // array of arrays of {letter, state}

  const todayKey = () => {
    const d = new Date();
    return `frogdle_${d.getFullYear()}_${d.getMonth()}_${d.getDate()}`;
  };

  function loadState() {
    try {
      const saved = JSON.parse(localStorage.getItem(todayKey()) || 'null');
      return saved;
    } catch { return null; }
  }

  function saveState(won) {
    localStorage.setItem(todayKey(), JSON.stringify({ guesses, tileStates, gameOver, won }));
  }

  // Build grid
  function buildGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    for (let r = 0; r < MAX_GUESSES; r++) {
      const row = document.createElement('div');
      row.className = 'row';
      row.id = `row-${r}`;
      for (let c = 0; c < WORD_LENGTH; c++) {
        const tile = document.createElement('div');
        tile.className = 'tile';
        tile.id = `tile-${r}-${c}`;
        row.appendChild(tile);
      }
      grid.appendChild(row);
    }
  }

  // Build keyboard
  function buildKeyboard() {
    const rows = [
      ['Q','W','E','R','T','Y','U','I','O','P'],
      ['A','S','D','F','G','H','J','K','L'],
      ['Enter','Z','X','C','V','B','N','M','⌫']
    ];
    const kb = document.getElementById('keyboard');
    kb.innerHTML = '';
    rows.forEach(r => {
      const row = document.createElement('div');
      row.className = 'kb-row';
      r.forEach(k => {
        const btn = document.createElement('button');
        btn.className = 'key' + (k === 'Enter' || k === '⌫' ? ' wide' : '');
        btn.textContent = k;
        btn.dataset.key = k;
        btn.addEventListener('click', () => handleKey(k));
        row.appendChild(btn);
      });
      kb.appendChild(row);
    });
  }

  function updateCurrentRow() {
    const row = guesses.length;
    for (let c = 0; c < WORD_LENGTH; c++) {
      const tile = document.getElementById(`tile-${row}-${c}`);
      const letter = currentGuess[c] || '';
      tile.textContent = letter;
      tile.className = 'tile' + (letter ? ' filled' : '');
    }
  }

  function handleKey(key) {
    if (gameOver) return;
    if (key === '⌫' || key === 'Backspace') {
      currentGuess = currentGuess.slice(0, -1);
      updateCurrentRow();
    } else if (key === 'Enter') {
      submitGuess();
    } else if (/^[A-Za-z]$/.test(key)) {
      if (currentGuess.length < WORD_LENGTH) {
        currentGuess += key.toUpperCase();
        updateCurrentRow();
      }
    }

  function showToast(msg, duration = 1400) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');

  }

  function evaluateGuess(guess) {
    const result = Array(WORD_LENGTH).fill('absent');
    const answerArr = ANSWER.split('');
    const guessArr = guess.split('');
    const used = Array(WORD_LENGTH).fill(false);

    // First pass: correct
    for (let i = 0; i < WORD_LENGTH; i++) {
      if (guessArr[i] === answerArr[i]) {
        result[i] = 'correct';
        used[i] = true;
      }
    }
    // Second pass: present
    for (let i = 0; i < WORD_LENGTH; i++) {
      if (result[i] === 'correct') continue;
      for (let j = 0; j < WORD_LENGTH; j++) {
        if (!used[j] && guessArr[i] === answerArr[j]) {
          result[i] = 'present';
          used[j] = true;
          break;
        }
      }
    }
    return result;
  }

  function animateRow(row, states, callback) {
    const tiles = document.querySelectorAll(`#row-${row} .tile`);
    tiles.forEach((tile, i) => {
      setTimeout(() => {
        tile.classList.add('flip');
        setTimeout(() => {
          tile.classList.remove('flip');
          tile.classList.add(states[i]);
        }, 250);
      }, i * 120);
    });
    setTimeout(callback, WORD_LENGTH * 120 + 300);
  }

  function bounceRow(row) {
    const tiles = document.querySelectorAll(`#row-${row} .tile`);
    tiles.forEach((tile, i) => {
      setTimeout(() => tile.classList.add('bounce'), i * 80);
      setTimeout(() => tile.classList.remove('bounce'), i * 80 + 700);
    });
  }

  function updateKeyboard(guess, states) {
    const priority = { correct: 3, present: 2, absent: 1 };
    const keyMap = {};
    for (let i = 0; i < WORD_LENGTH; i++) {
      const k = guess[i];
      const s = states[i];
      if (!keyMap[k] || priority[s] > priority[keyMap[k]]) {
        keyMap[k] = s;
      }
    }
    for (const [k, s] of Object.entries(keyMap)) {
      const btn = document.querySelector(`.key[data-key="${k}"]`);
      if (btn) {
        if (!btn.classList.contains('correct')) {
          btn.classList.remove('correct', 'present', 'absent');
          btn.classList.add(s);
        }
      }
    }
  }

  function submitGuess() {
    if (currentGuess.length < WORD_LENGTH) {
      shakeRow(guesses.length);
      showToast('Not enough letters');
      return;
    }
    if (!VALID_WORDS.has(currentGuess)) {
      shakeRow(guesses.length);
      showToast('Not in word list');
      return;
    }

    const row = guesses.length;
    const states = evaluateGuess(currentGuess);
    tileStates.push(currentGuess.split('').map((l, i) => ({ letter: l, state: states[i] })));

    animateRow(row, states, () => {
      updateKeyboard(currentGuess, states);
      guesses.push(currentGuess);

      const won = currentGuess === ANSWER;
      if (won) {
        gameOver = true;
        setTimeout(() => {
          bounceRow(row);
          setTimeout(() => showEndCard(true), 600);
        }, 100);
        saveState(true);
      } else if (guesses.length === MAX_GUESSES) {
        gameOver = true;
        setTimeout(() => showEndCard(false), 400);
        saveState(false);
      } else {
        currentGuess = '';
        saveState(false);
      }
    });
  }

  function shakeRow(row) {
    const tiles = document.querySelectorAll(`#row-${row} .tile`);
    tiles.forEach(t => {
      t.classList.add('shake');
      setTimeout(() => t.classList.remove('shake'), 400);
    });
  }

  function showEndCard(won) {
    const card = document.getElementById('end-card');
    card.classList.add('visible');

    document.getElementById('result-emoji').textContent = won ? '🐸' : '💧';
    document.getElementById('result-title').textContent = won
      ? ['RIBBIT!', 'LEAPING!', 'HOPPY!', 'FROGGY!'][Math.min(guesses.length - 1, 3)]
      : 'SPLAT...';
    document.getElementById('result-subtitle').textContent = won
      ? `Got it in ${guesses.length} ${guesses.length === 1 ? 'guess' : 'guesses'}!`
      : 'Better luck tomorrow — the answer was FROGS';

    startCountdown('countdown');
  }

  function startCountdown(id) {
    function tick() {
      const now = new Date();
      const tomorrow = new Date(now);
      tomorrow.setDate(tomorrow.getDate() + 1);
      tomorrow.setHours(0, 0, 0, 0);
      const diff = tomorrow - now;
      const h = Math.floor(diff / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      const pad = n => String(n).padStart(2, '0');
      document.getElementById(id).innerHTML =
        `Next Frogdle in <span>${pad(h)}:${pad(m)}:${pad(s)}</span>`;
    }
    tick();
    setInterval(tick, 1000);
  }

  function buildShareText() {
    const num = guesses.length;
    const won = guesses[guesses.length - 1] === ANSWER;
    const emoji = { correct: '🟩', present: '🟨', absent: '⬛' };
    const header = `FROGDLE 🐸 ${won ? num : 'X'}/${MAX_GUESSES}`;
    const rows = tileStates.map(g => g.map(t => emoji[t.state]).join('')).join('\n');
    return `${header}\n${rows}\nhttps://yourname.github.io/frogdle`;
  }

  function share() {
    const text = buildShareText();
    if (navigator.share) {
      navigator.share({ text }).catch(() => {});
    } else {
      navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard!'));
    }
  }

  function restoreCompletedGame(saved) {
    // Rebuild grid tiles from saved state
    saved.tileStates.forEach((gRow, row) => {
      gRow.forEach(({ letter, state }, col) => {
        const tile = document.getElementById(`tile-${row}-${col}`);
        tile.textContent = letter;
        tile.className = `tile ${state}`;
      });
    });
    // Restore keyboard
    saved.tileStates.forEach((gRow, i) => {
      const g = gRow.map(t => t.letter).join('');
      const states = gRow.map(t => t.state);
      updateKeyboard(g, states);
    });
  }

  // INIT
  function init() {
    buildGrid();
    buildKeyboard();

    const saved = loadState();

    if (saved && saved.gameOver) {
      // Already finished today
      guesses = saved.guesses || [];
      tileStates = saved.tileStates || [];
      gameOver = true;
      restoreCompletedGame(saved);

      // Show already-played screen after brief moment
      setTimeout(() => {
        const ap = document.getElementById('already-played');
        ap.classList.add('visible');
        startCountdown('ap-countdown');
        showEndCard(saved.won);
      }, 200);
    } else {
      // Fresh game (possibly mid-progress, but we reset daily)
      document.getElementById('grid').style.display = 'grid';
    }

    document.addEventListener('keydown', e => {
      if (e.ctrlKey || e.metaKey || e.altKey) return;
      if (e.key === 'Backspace') handleKey('Backspace');
      else if (e.key === 'Enter') handleKey('Enter');
      else if (/^[a-zA-Z]$/.test(e.key)) handleKey(e.key);
    });
  }

  init();
</script>
</body>
</html>
